{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">💧</div>
      <h2>Welcome back</h2>
      <p>Sign in to your Maji Flow account</p>
    </div>

    {% if error %}
      <div class="alert alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form class="auth-form" method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full">Login →</button>
    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('register') }}">Register here</a>
    </div>

    <!-- Quick-fill demo buttons -->
    <div class="demo-hints">
      <p>Quick demo login:</p>
      <button class="demo-fill-btn" onclick="fillDemo('resident@majiflow.co.zm','water123')">
        🏠 Resident Demo
      </button>
      <button class="demo-fill-btn" onclick="fillDemo('utility@lwsc.co.zm','lwsc2026')">
        ⚡ Utility Demo
      </button>
    </div>
  </div>
</div>

<script>
function fillDemo(email, password) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = password;
}
</script>
{% endblock %}
